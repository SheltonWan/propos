name: propos_backend
description: PropOS — Property Operating System Backend (Dart + Shelf)
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.0.0

dependencies:
  shelf: ^1.4.2
  shelf_router: ^1.1.2
  postgres: ^3.3.0
  dart_jsonwebtoken: ^2.12.2
  crypto: ^3.0.3
  encrypt: ^5.0.3
  dotenv: ^4.2.0
  uuid: ^4.4.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  excel: ^4.0.3
  csv: ^6.0.0
  clock: ^1.1.2
  path: ^1.9.0
  mime: ^1.0.6
  propos_rent_escalation_engine:
    path: packages/rent_escalation_engine
  propos_kpi_scorer:
    path: packages/kpi_scorer

dev_dependencies:
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  http: ^1.2.0
  test: ^1.25.6
  lints: ^4.0.0
