server {
    listen 80;
    server_name _;

    # admin SPA 静态文件根目录（与 docker run -v 挂载路径对应）
    root /usr/share/nginx/html;
    index index.html;

    # 字符集
    charset utf-8;

    # Gzip 压缩（减少 JS/CSS 传输体积）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        font/woff2;

    # /api/ 反代到 backend 容器（Docker 网络 DNS 解析容器名）
    location /api/ {
        proxy_pass         http://propos-backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # 超时配置（文件上传等长操作适当放宽）
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 上传文件大小限制（与 backend MAX_UPLOAD_SIZE_MB 保持一致）
        client_max_body_size 50m;
    }

    # index.html 强制不缓存：每次部署后浏览器必须重新拉取最新版本
    # 由于 Vite 产物文件名含 hash，只要 index.html 是最新的，JS/CSS 即自动更新
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Vue Router history 模式：未匹配到文件则回退到 index.html
    # 回退响应同样携带 no-cache 头，确保 SPA 路由刷新不缓存入口文件
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 静态资源缓存（vite 构建产物含 hash，可长缓存）
    # 注意：目录名 _assets 刻意区别于 Vue Router 路由前缀 /assets/
    location /_assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 关闭对 .env / .git 等敏感文件的访问
    location ~ /\. {
        deny all;
        return 404;
    }
}
