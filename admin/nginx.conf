server {
    listen 80;
    server_name _;

    # admin SPA 静态文件根目录（与 docker run -v 挂载路径对应）
    root /usr/share/nginx/html;
    index index.html;

    # 字符集
    charset utf-8;

    # Gzip 压缩（减少 JS/CSS 传输体积）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        font/woff2;

    # /api/ 反代到 backend 容器（Docker 网络 DNS 解析容器名）
    location /api/ {
        proxy_pass         http://propos-backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # 超时配置（文件上传等长操作适当放宽）
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 上传文件大小限制（与 backend MAX_UPLOAD_SIZE_MB 保持一致）
        client_max_body_size 50m;
    }

    # Vue Router history 模式：未匹配到文件则回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（vite 构建产物含 hash，可长缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 关闭对 .env / .git 等敏感文件的访问
    location ~ /\. {
        deny all;
        return 404;
    }
}
