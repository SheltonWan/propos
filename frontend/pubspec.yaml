name: propos_frontend
description: PropOS — Property Operating System Flutter Client
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  flutter_bloc: ^8.1.6
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.69.0
  mobile_scanner: ^5.2.3
  file_picker: ^8.1.4
  image_picker: ^1.1.2
  excel: ^4.0.3
  get_it: ^8.0.3
  clock: ^1.1.2
  propos_rent_escalation_engine:
    path: ../backend/packages/rent_escalation_engine
  propos_kpi_scorer:
    path: ../backend/packages/kpi_scorer

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  freezed: ^3.2.0
  json_serializable: ^6.8.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  flutter_lints: ^4.0.0

