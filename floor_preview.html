<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Floor SVG Preview · 主题 + 缩放</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #f5f5f7; }

  .toolbar {
    position: sticky; top: 0; z-index: 10;
    padding: 10px 16px; background: #fff; border-bottom: 1px solid #e5e5ea;
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap; font-size: 13px;
  }
  .group { display: flex; gap: 6px; align-items: center; }
  .group label { color: #6e6e73; }
  .toolbar select, .toolbar button {
    padding: 5px 10px; border: 1px solid #d1d1d6; background: #fff;
    border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .15s;
  }
  .toolbar button:hover { background: #f5f5f7; }
  .toolbar button.active { background: #0071e3; color: #fff; border-color: #0071e3; }
  .info { margin-left: auto; color: #86868b; font-variant-numeric: tabular-nums; }

  #stage {
    position: relative; overflow: hidden; cursor: grab; user-select: none;
    width: 100vw; height: calc(100vh - 52px);
  }
  #stage.grabbing { cursor: grabbing; }
  #viewport {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0; will-change: transform;
  }
  #viewport svg { display: block; }

  .status {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #86868b; font-size: 14px; padding: 20px; white-space: pre-wrap; text-align: center;
  }
  .status.error { color: #d4183d; }

  /* 主题方案 — 通过 currentColor 传入内联 SVG */
  .theme-light { color: #717182; background: #ffffff; }
  .theme-dark  { color: #a1a1a6; background: #1d1d1f; }
  .theme-blue  { color: #0071e3; background: #ffffff; }
  .theme-green { color: #34c759; background: #ffffff; }
  .theme-mono  { color: #1d1d1f; background: #ffffff; }

  /* 房间热区 — 叠加在 SVG 线稿上（stroke-width 使用 SVG 坐标单位） */
  .unit-dot {
    fill: rgba(0, 113, 227, .18);
    stroke: #0071e3;
    stroke-width: 3000;
    cursor: pointer;
    transition: fill .18s, stroke .18s;
  }
  .unit-hotspot:hover .unit-dot {
    fill: rgba(0, 113, 227, .42);
    stroke: #0047b3;
  }
  /* 按状态着色 */
  .unit-leased       .unit-dot { fill: rgba(52, 199,  89, .22); stroke: #34c759; }
  .unit-leased:hover .unit-dot { fill: rgba(52, 199,  89, .45); }
  .unit-expiring_soon       .unit-dot { fill: rgba(255,149,  0, .22); stroke: #ff9500; }
  .unit-expiring_soon:hover .unit-dot { fill: rgba(255,149,  0, .45); }
  .unit-overdue       .unit-dot { fill: rgba(255,  59, 48, .22); stroke: #ff3b30; }
  .unit-overdue:hover .unit-dot { fill: rgba(255,  59, 48, .45); }
  .unit-non_leasable       .unit-dot { fill: rgba(142,142,147, .18); stroke: #8e8e93; }
  .unit-non_leasable:hover .unit-dot { fill: rgba(142,142,147, .38); }

  /* 热区隐藏模式 */
  #viewport.hotspots-hidden .unit-hotspot { display: none; }

  /* 悬停信息气泡 */
  #hotspot-tip {
    position: absolute; pointer-events: none; z-index: 20;
    background: rgba(29,29,31,.88); backdrop-filter: blur(10px) saturate(180%);
    -webkit-backdrop-filter: blur(10px) saturate(180%);
    color: #f5f5f7; border-radius: 10px; padding: 9px 13px;
    font-size: 12px; line-height: 1.6; white-space: nowrap;
    display: none; transform: translate(14px, -50%);
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }
  #hotspot-tip strong { font-size: 13px; display: block; margin-bottom: 1px; }
  #hotspot-tip .tip-area { color: #a1a1a6; font-size: 11px; }
</style>
</head>
<body>

<div style="background:#0071e3;color:#fff;padding:6px 16px;font-size:12px;font-family:monospace;">
  Preview v4-2026-04-28 · 当前楼层 ↓ <span id="curName" style="font-weight:bold;">-</span>
</div>

<div class="toolbar">
  <div class="group">
    <label>楼层:</label>
    <select id="floorSel"></select>
  </div>
  <div class="group">
    <label>主题:</label>
    <button data-theme="light" class="active">浅色</button>
    <button data-theme="dark">深色</button>
    <button data-theme="blue">Apple Blue</button>
    <button data-theme="green">Success</button>
    <button data-theme="mono">纯黑</button>
  </div>
  <div class="group">
    <label>热区:</label>
    <button id="toggleHotspots" class="active" title="切换房间热区显示">显示</button>
  </div>
  <div class="group">
    <label>缩放:</label>
    <button id="zoomOut" title="缩小">−</button>
    <button id="zoomReset" title="100%">100%</button>
    <button id="zoomIn" title="放大">+</button>
    <button id="fitBtn" title="适应窗口">适应</button>
  </div>
  <div class="info">
    <span id="zoomLabel">100%</span> · 滚轮缩放 · 拖拽平移 · 双击适应
  </div>
</div>

<div id="stage" class="theme-light">
  <div id="viewport"></div>
  <div id="status" class="status">加载中…</div>
  <div id="hotspot-tip"></div>
</div>

<script>
      const PREVIEW_VERSION = 'v4-2026-04-28';
      console.log('[preview] script loaded', PREVIEW_VERSION);
(() => {
  const FLOORS_DIR = 'cad_intermediate/building_a/floors';
  const FLOORS = [
    'A座_F6-F8-F10', 'A座_F7-F9', 'A座_F11', 'A座_F12-F14', 'A座_F13-F15',
    'A座_F16', 'A座_F17', 'A座_F18', 'A座_F19-F21-F23', 'A座_F20-F22',
    'A座_屋顶', 'A座_屋顶构架',
  ];

  const stage     = document.getElementById('stage');
  const viewport  = document.getElementById('viewport');
  const status    = document.getElementById('status');
  const floorSel  = document.getElementById('floorSel');
  const zoomLabel = document.getElementById('zoomLabel');
  console.log('[preview] elements', { stage: !!stage, viewport: !!viewport, status: !!status, floorSel: !!floorSel, zoomLabel: !!zoomLabel });

  FLOORS.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    floorSel.appendChild(opt);
  });

  let scale = 1, tx = 0, ty = 0;
  let svgW = 0, svgH = 0;

  const applyTransform = () => {
    viewport.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    zoomLabel.textContent = (scale * 100).toFixed(0) + '%';
  };

  const fitToStage = () => {
    if (!svgW || !svgH) return;
    const sw = stage.clientWidth, sh = stage.clientHeight, padding = 40;
    scale = Math.min((sw - padding) / svgW, (sh - padding) / svgH);
    tx = (sw - svgW * scale) / 2;
    ty = (sh - svgH * scale) / 2;
    applyTransform();
  };

  const showStatus = (msg, isError = false) => {
    status.style.display = 'flex';
    status.className = 'status' + (isError ? ' error' : '');
    status.textContent = msg;
  };

  async function loadFloor(name) {
    console.log('[preview] loadFloor', name);
    const curNameEl = document.getElementById('curName');
    if (curNameEl) curNameEl.textContent = name + '  (loading...)';
    showStatus('加载中…');
    viewport.innerHTML = '';

    try {
      const url = `${FLOORS_DIR}/${encodeURIComponent(name)}.svg`;
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status} — ${url}`);
      const text = await res.text();

      // 先用 innerHTML 注入（比 DOMParser+appendChild 跨文档适配更可靠），
      // 再拿到真实的 svg 元素补充 width/height。
      viewport.innerHTML = text;
      const svg = viewport.querySelector('svg');
      if (!svg) throw new Error('SVG 根元素解析失败');
      const vb = (svg.getAttribute('viewBox') || '0 0 1000 1000').split(/\s+/).map(Number);
      const vbW = vb[2], vbH = vb[3];
      // 给一个合理的基础像素尺寸（避免 1e6 像素画布）
      const BASE_W = 1600;
      svgW = BASE_W;
      svgH = BASE_W * (vbH / vbW);
      svg.setAttribute('width', svgW);
      svg.setAttribute('height', svgH);

      status.style.display = 'none';
      fitToStage();
      // 加载完成闪烁一下背景，让用户能直观看到刷新
      stage.style.transition = 'opacity .15s';
      stage.style.opacity = '0.3';
      setTimeout(() => { stage.style.opacity = '1'; }, 80);
      // 统计内容指纹
      const pathCount = svg.querySelectorAll('path').length;
      const allElems = svg.querySelectorAll('*').length;
      const sizeKB = (text.length / 1024).toFixed(0);
      const curNameEl = document.getElementById('curName');
      if (curNameEl) curNameEl.textContent = `${name}  ·  ${sizeKB} KB  ·  ${pathCount} paths / ${allElems} elems  ·  ${svgW.toFixed(0)}×${svgH.toFixed(0)}px @ scale=${scale.toFixed(3)}`;
    } catch (e) {
      showStatus('加载失败：' + e.message + '\n请确认本地服务器在 propos/ 根目录运行：\n  python3 -m http.server 8765\n然后访问 http://localhost:8765/floor_preview.html', true);
      console.error(e);
    }
  }

  // 滚轮缩放（以鼠标位置为锚点）
  stage.addEventListener('wheel', (e) => {
    e.preventDefault();
    console.log('[preview] wheel', e.deltaY);
    const rect = stage.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    const ns = Math.max(0.05, Math.min(40, scale * factor));
    tx = mx - (mx - tx) * (ns / scale);
    ty = my - (my - ty) * (ns / scale);
    scale = ns; applyTransform();
  }, { passive: false });

  // 拖拽平移
  let dragging = false, sx = 0, sy = 0, sTx = 0, sTy = 0;
  stage.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    dragging = true; stage.classList.add('grabbing');
    sx = e.clientX; sy = e.clientY; sTx = tx; sTy = ty;
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    tx = sTx + (e.clientX - sx);
    ty = sTy + (e.clientY - sy);
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    dragging = false; stage.classList.remove('grabbing');
  });
  stage.addEventListener('dblclick', fitToStage);

  // 触屏：双指捏合 / 单指拖动
  let pinchDist = 0, pinchScale = 1;
  stage.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const [a, b] = e.touches;
      pinchDist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
      pinchScale = scale;
    } else if (e.touches.length === 1) {
      dragging = true; sx = e.touches[0].clientX; sy = e.touches[0].clientY;
      sTx = tx; sTy = ty;
    }
  }, { passive: true });
  stage.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const [a, b] = e.touches;
      const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
      const ns = Math.max(0.05, Math.min(40, pinchScale * (d / pinchDist)));
      const cx = (a.clientX + b.clientX) / 2 - stage.getBoundingClientRect().left;
      const cy = (a.clientY + b.clientY) / 2 - stage.getBoundingClientRect().top;
      tx = cx - (cx - tx) * (ns / scale);
      ty = cy - (cy - ty) * (ns / scale);
      scale = ns; applyTransform();
    } else if (e.touches.length === 1 && dragging) {
      tx = sTx + (e.touches[0].clientX - sx);
      ty = sTy + (e.touches[0].clientY - sy);
      applyTransform();
    }
  }, { passive: false });
  stage.addEventListener('touchend', () => { dragging = false; });

  // 工具栏按钮
  const zoomAt = (factor) => {
    const cx = stage.clientWidth / 2, cy = stage.clientHeight / 2;
    const ns = Math.max(0.05, Math.min(40, scale * factor));
    tx = cx - (cx - tx) * (ns / scale);
    ty = cy - (cy - ty) * (ns / scale);
    scale = ns; applyTransform();
  };
  document.getElementById('zoomIn').onclick = () => { console.log('[preview] zoom in click'); zoomAt(1.25); };
  document.getElementById('zoomOut').onclick = () => { console.log('[preview] zoom out click'); zoomAt(1 / 1.25); };
  document.getElementById('zoomReset').onclick = () => {
    console.log('[preview] zoom reset click');
    scale = 1; tx = (stage.clientWidth - svgW) / 2; ty = (stage.clientHeight - svgH) / 2; applyTransform();
  };
  document.getElementById('fitBtn').onclick = () => { console.log('[preview] fit click'); fitToStage(); };

  // 主题切换
  document.querySelectorAll('.toolbar [data-theme]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.toolbar [data-theme]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      stage.className = 'theme-' + btn.dataset.theme;
    });
  });

  // 热区显示 / 隐藏切换
  const hotspotBtn = document.getElementById('toggleHotspots');
  hotspotBtn.addEventListener('click', () => {
    hotspotBtn.classList.toggle('active');
    const show = hotspotBtn.classList.contains('active');
    hotspotBtn.textContent = show ? '显示' : '隐藏';
    viewport.classList.toggle('hotspots-hidden', !show);
  });

  // 热区悬停气泡
  const hotspotTip = document.getElementById('hotspot-tip');
  let tipTarget = null;
  viewport.addEventListener('mouseover', (e) => {
    const g = e.target.closest('.unit-hotspot');
    if (!g || g === tipTarget) return;
    tipTarget = g;
    const unitId   = g.dataset.unitId   || '';
    const roomName = g.dataset.roomName || '';
    const area     = g.dataset.areaSqm  ? g.dataset.areaSqm + ' m²' : '';
    hotspotTip.innerHTML =
      `<strong>${unitId}</strong>` +
      (roomName ? `${roomName}<br>` : '') +
      (area ? `<span class="tip-area">${area}</span>` : '');
    hotspotTip.style.display = 'block';
  });
  viewport.addEventListener('mousemove', (e) => {
    if (!tipTarget) return;
    const rect = stage.getBoundingClientRect();
    hotspotTip.style.left = (e.clientX - rect.left) + 'px';
    hotspotTip.style.top  = (e.clientY - rect.top)  + 'px';
  });
  viewport.addEventListener('mouseout', (e) => {
    if (e.target.closest('.unit-hotspot') && !e.relatedTarget?.closest('.unit-hotspot')) {
      tipTarget = null;
      hotspotTip.style.display = 'none';
    }
  });

  // 楼层切换（同时监听 change/input 以兼容不同浏览器行为）
  const onFloorChange = () => {
    console.log('[preview] 切换楼层 →', floorSel.value);
    loadFloor(floorSel.value);
  };
  floorSel.addEventListener('change', onFloorChange);
  floorSel.addEventListener('input', onFloorChange);

  // 默认加载 F11
  floorSel.value = 'A座_F11';
  loadFloor('A座_F11');
})();
</script>
</body>
</html>
